<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好，这是我的联系方式❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: url('bg.jpg') no-repeat center center;
            background-size: cover;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                180deg,
                rgba(0, 0, 0, 0.15) 0%,
                rgba(0, 0, 0, 0.05) 40%,
                rgba(0, 0, 0, 0.25) 100%
            );
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.9);
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            animation: fadeDown 0.8s ease-out both;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .signature {
            margin-top: 20px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 3px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            opacity: 0;
            animation: fadeDown 0.8s ease-out 0.2s both;
        }

        .icon-group {
            position: absolute;
            bottom: 14%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 36px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.4s both;
        }

        .icon-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                        box-shadow 0.25s ease;
        }

        .icon-btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
        }

        .icon-btn:active {
            transform: translateY(-1px) scale(0.98);
        }

        .icon-btn img {
            width: 55%;
            height: 55%;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.1));
        }

        .mask {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .mask.active {
            opacity: 1;
            visibility: visible;
        }

        .qr-card {
            width: 260px;
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mask.active .qr-card {
            transform: scale(1) translateY(0);
        }

        .qr-label {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .qr-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: contain;
            border-radius: 8px;
            display: block;
        }

        .music-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 99;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease;
            border: none;
            outline: none;
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: spin 3s linear infinite;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer-line {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 1px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.6s both;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="avatar">
            <img src="avatar.jpg" alt="头像">
        </div>

        <div class="signature">很高兴认识你</div>

        <div class="icon-group">
            <div class="icon-btn" onclick="showQR('qq', 'QQ')">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v13/icons/tencentqq.svg" alt="QQ">
            </div>
            <div class="icon-btn" onclick="showQR('wechat', '微信')">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v13/icons/wechat.svg" alt="微信">
            </div>
            <div class="icon-btn" onclick="showQR('douyin', '抖音')">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v13/icons/tiktok.svg" alt="抖音">
            </div>
        </div>

        <div class="footer-line"></div>
    </div>

    <div class="mask" id="mask" onclick="closeQR(event)">
        <div class="qr-card" onclick="event.stopPropagation()">
            <div class="qr-label" id="qrLabel">扫码添加</div>
            <img id="qrImg" src="" alt="二维码">
        </div>
    </div>

    <button class="music-btn" id="musicBtn" onclick="toggleMusic()" aria-label="音乐">🎵</button>

    <audio id="bgMusic" loop>
        <source src="bgmusic.mp3" type="audio/mpeg">
    

<script>
const qrMap = { qq: 'qq.png', wechat: 'wechat.png', douyin: 'douyin.png' };
function showQR(type, label) {
    const img = document.getElementById('qrImg');
    const mask = document.getElementById('mask');
    document.getElementById('qrLabel').textContent = label + ' · 扫码添加';
    img.src = qrMap[type] || '';
    mask.classList.add('active');
}
function closeQR(e) {
    if (e.target === document.getElementById('mask')) {
        document.getElementById('mask').classList.remove('active');
    }
}

const audio = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
let isPlay = false;

function toggleMusic() {
    audio.volume = 0.5;
    if (!isPlay) {
        audio.play().then(() => {
            musicBtn.textContent = '⏸';
            isPlay = true;
        }).catch(err => {});
    } else {
        audio.pause();
        musicBtn.textContent = '🎵';
        isPlay = false;
    }
}
</script>

</body>
</html>
